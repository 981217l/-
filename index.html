<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>李海瑞的名片</title>
    <style>
        body {
            background-color: #08062c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .card {
            background-color: rgb(255, 255, 255);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(182, 85, 85, 0.1);
            text-align: center;
            width: 300px;
        }
        .avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;  /* 保证图片填充且不变形 */
    margin: 0 auto 20px;
    display: block;     /* 让图片居中 */
}
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .bio {
            color: #666;
            margin-bottom: 20px;
        }
        .btn {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="avatar.jpg" alt="我的头像" class="avatar">
        <div class="name">李海瑞</div>
        <div class="bio">学习编程的小白 | 热爱生活</div>
        <div class="bio">联系我 18375985621</div>
        <a href="about.html" class="btn">关于我</a>
    </div>
</body>

</html>
